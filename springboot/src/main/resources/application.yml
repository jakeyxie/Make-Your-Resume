server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    url: jdbc:mysql://localhost:3306/graduation_2025?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
  mail:
    host: smtp.qq.com
    username: ${SMTP_USERNAME:<EMAIL>}
    password: ${SMTP_PASSWORD:<PASSWORD>}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
    default-encoding: UTF-8

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# JWT配置
jwt:
  secret: ${JWT_SECRET:${JWT_SECRET:<SECRET>}}

# CORS配置（多个用逗号分隔）
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:8080}

# 前端URL（用于邮件中的重置链接）
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

# 阿里云 OSS 配置
aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
    access-key-id: ${OSS_ACCESS_KEY_ID:<KEY>}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:<SECRET>}
    bucket-name: ${OSS_BUCKET_NAME:<BUCKET_NAME>}
    cdn-domain: ${OSS_CDN_DOMAIN:}
